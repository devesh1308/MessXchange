name: messxchangenew
description: Standardized Hostel/PG Meal Credit Swapping System
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.19.0

  # State Management
  provider: ^6.1.1

  # QR & Scanning
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.2

  # Firebase (For Phase 2)
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Registering Assets
  assets:
    - assets/images/logo.png
